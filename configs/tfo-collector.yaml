# =============================================================================
# TelemetryFlow Collector Configuration (OCB Native v1.2.1)
# =============================================================================
# TelemetryFlow GO MCP Server - Docker Compose
#
# Usage: ./tfo-collector --config configs/tfo-collector.yaml
#
# The unified build includes:
# - All 85+ OpenTelemetry Collector community components
# - TFO custom components (tfootlp, tfo, tfoauth, tfoidentity)
#
# =============================================================================
# Environment Variables
# =============================================================================
#   TELEMETRYFLOW_API_KEY_ID      - API Key ID (tfk_xxx)
#   TELEMETRYFLOW_API_KEY_SECRET  - API Key Secret (tfs_xxx)
#   TELEMETRYFLOW_ENDPOINT        - TelemetryFlow backend endpoint
#   TELEMETRYFLOW_COLLECTOR_ID    - Unique collector identifier
#   TELEMETRYFLOW_COLLECTOR_NAME  - Human-readable collector name
#   TELEMETRYFLOW_ENVIRONMENT     - Deployment environment
# =============================================================================

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

  zpages:
    endpoint: "0.0.0.0:55679"

  pprof:
    endpoint: "0.0.0.0:1777"

  tfoauth:
    api_key_id: "${env:TELEMETRYFLOW_API_KEY_ID}"
    api_key_secret: "${env:TELEMETRYFLOW_API_KEY_SECRET}"

  tfoidentity:
    id: ""
    name: "TelemetryFlow MCP Collector"
    description: "TelemetryFlow Collector - MCP Server Environment"
    tags:
      environment: "${env:TELEMETRYFLOW_ENVIRONMENT:-development}"
      datacenter: default
    enrich_resources: true

receivers:
  tfootlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
        max_recv_msg_size_mib: 4
        max_concurrent_streams: 100
        read_buffer_size: 524288
        write_buffer_size: 524288
        keepalive:
          server_parameters:
            max_connection_idle: 15s
            max_connection_age: 30s
            max_connection_age_grace: 5s
            time: 10s
            timeout: 5s
      http:
        endpoint: "0.0.0.0:4318"
        transport: tcp
        cors:
          allowed_origins:
            - "*"
          allowed_headers:
            - "*"
    enable_v2_endpoints: true
    v2_auth:
      required: true
      validate_secret: false

processors:
  batch:
    timeout: 200ms
    send_batch_size: 8192
    send_batch_max_size: 0

  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false

  resource:
    attributes:
      - key: service.namespace
        value: telemetryflow
        action: upsert
      - key: deployment.environment
        value: "${env:TELEMETRYFLOW_ENVIRONMENT:-development}"
        action: upsert

  attributes/agent:
    actions:
      - key: tfo.source
        value: "tfo-mcp"
        action: insert

connectors:
  span_metrics:
    histogram:
      explicit:
        buckets: [1ms, 5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - name: http.method
        default: GET
      - name: http.status_code
      - name: http.route
      - name: rpc.method
      - name: rpc.service
    exemplars:
      enabled: true
    namespace: traces
    metrics_flush_interval: 15s

  service_graph:
    latency_histogram_buckets: [1ms, 5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]
    dimensions:
      - http.method
      - http.status_code
    store:
      ttl: 10s
      max_items: 5000
    cache_loop: 2s
    store_expiration_loop: 5s
    virtual_node_peer_attributes:
      - db.system
      - messaging.system
      - rpc.service
      - net.peer.name
      - server.address
    metrics_flush_interval: 15s

exporters:
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

  tfo:
    endpoint: "${env:TELEMETRYFLOW_ENDPOINT:-http://host.docker.internal:3000}"
    use_v2_api: true
    headers:
      X-TelemetryFlow-Key-ID: "${env:TELEMETRYFLOW_API_KEY_ID}"
      X-TelemetryFlow-Key-Secret: "${env:TELEMETRYFLOW_API_KEY_SECRET}"
    collector_identity: tfoidentity
    timeout: 30s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    compression: gzip

service:
  extensions: [health_check, zpages, pprof, tfoauth, tfoidentity]

  pipelines:
    traces:
      receivers: [tfootlp]
      processors: [memory_limiter, resourcedetection, resource, attributes/agent, batch]
      exporters: [debug, tfo, span_metrics, service_graph]

    metrics:
      receivers: [tfootlp]
      processors: [memory_limiter, resourcedetection, resource, attributes/agent, batch]
      exporters: [debug, tfo]

    metrics/span_metrics:
      receivers: [span_metrics]
      processors: [memory_limiter, resource, batch]
      exporters: [tfo]

    metrics/service_graph:
      receivers: [service_graph]
      processors: [memory_limiter, resource, batch]
      exporters: [tfo]

    logs:
      receivers: [tfootlp]
      processors: [memory_limiter, resourcedetection, resource, attributes/agent, batch]
      exporters: [debug, tfo]

  telemetry:
    logs:
      level: info
      encoding: json
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
